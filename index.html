<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fidenza Embed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0e17; }
    canvas { display: block; pointer-events: none; }

    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0f0e17;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.85s cubic-bezier(0.4,0,0.2,1);
    }

    #intro-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #sketch-host {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1);
    }
    #sketch-host.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="intro-overlay">
    <canvas id="intro-canvas"></canvas>
  </div>

  <div id="sketch-host">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
    <script src="sketch.js"></script>
  </div>

  <script>
  (function(){
    const YELLOW     = '#e8fe41';
    const BG         = '#0f0e17';
    const TRAIL_DARK = 'rgba(10,18,30,'; // particle trail color (dark on yellow)

    const canvas = document.getElementById('intro-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, CX, CY, SR;

    function resize(){
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      CX = W / 2;
      CY = H / 2;
      SR = Math.min(W, H) * 0.38;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── TOUCH POINTS ─────────────────────────────────────────────
    function getTouchPoints(){
      return [
        { x: CX - SR * 0.28, y: CY - SR * 0.32 },
        { x: CX + SR * 0.38, y: CY + SR * 0.08 },
        { x: CX - SR * 0.06, y: CY + SR * 0.42 },
      ];
    }

    // ── PARTICLE ─────────────────────────────────────────────────
    class Particle {
      constructor(ox, oy){
        // random outward angle with slight curve tendency
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.5 + Math.random() * 1.4;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.x  = ox + (Math.random()-0.5) * 4;
        this.y  = oy + (Math.random()-0.5) * 4;
        this.trail = [{ x: this.x, y: this.y }];
        this.life    = 0;
        this.maxLife = 55 + Math.random() * 70;
        this.w       = 1.4 + Math.random() * 2.8;
        this.curve   = (Math.random() - 0.5) * 0.09; // rotation per frame (radians)
      }

      update(){
        this.life++;

        // curve the velocity
        const s = Math.sin(this.curve), c = Math.cos(this.curve);
        const nvx = this.vx * c - this.vy * s;
        const nvy = this.vx * s + this.vy * c;
        this.vx = nvx; this.vy = nvy;

        this.x += this.vx;
        this.y += this.vy;
        this.trail.push({ x: this.x, y: this.y });
        if(this.trail.length > 16) this.trail.shift();
      }

      draw(ctx){
        if(this.trail.length < 2) return;
        const p = this.life / this.maxLife;
        const alpha = p < 0.15 ? p/0.15 : p > 0.6 ? 1-(p-0.6)/0.4 : 1;

        ctx.beginPath();
        ctx.moveTo(this.trail[0].x, this.trail[0].y);
        for(let i = 1; i < this.trail.length; i++){
          ctx.lineTo(this.trail[i].x, this.trail[i].y);
        }
        ctx.strokeStyle = TRAIL_DARK + (alpha * 0.85).toFixed(3) + ')';
        ctx.lineWidth   = this.w;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.stroke();
      }

      isDead(){ return this.life >= this.maxLife; }
    }

    // ── CURSOR DRAW ───────────────────────────────────────────────
    function drawCursor(x, y){
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 22);
      ctx.lineTo(5.5, 17);
      ctx.lineTo(9, 25);
      ctx.lineTo(12, 24);
      ctx.lineTo(8.5, 16);
      ctx.lineTo(15, 16);
      ctx.closePath();
      ctx.fillStyle   = BG;
      ctx.fill();
      ctx.strokeStyle = YELLOW;
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = 'round';
      ctx.stroke();
      ctx.restore();
    }

    // ── EASING ───────────────────────────────────────────────────
    function easeInOut(t){ return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
    function lerp(a, b, t){ return a + (b-a)*t; }

    // ── STATE MACHINE ─────────────────────────────────────────────
    const MOVE_MS = 1100;
    const EMIT_MS = 1400;
    const RAMP_MS = 180;

    let phase      = 'init';
    let phaseStart = null;
    let phaseIdx   = 0;

    let cursorX = 0, cursorY = 0;
    let moveFromX, moveFromY, moveToX, moveToY;

    let emitting  = false;
    let emitRate  = 0;
    let emitX = 0, emitY = 0;

    let particles = [];

    let exitFadeStart = null;

    function setPhase(name, now){
      phase = name;
      phaseStart = now;
    }

    function tick(now){
      const pts     = getTouchPoints();
      const elapsed = phaseStart !== null ? now - phaseStart : 0;

      switch(phase){

        case 'init':
          // Place cursor off-screen to the side of first point, then start
          cursorX = pts[0].x - SR * 0.65;
          cursorY = pts[0].y - SR * 0.55;
          if(elapsed > 350){
            moveFromX = cursorX; moveFromY = cursorY;
            moveToX   = pts[0].x; moveToY = pts[0].y;
            phaseIdx  = 0;
            setPhase('move', now);
          }
          break;

        case 'move': {
          emitting = false;
          emitRate = 0;
          const p = Math.min(1, elapsed / MOVE_MS);
          cursorX = lerp(moveFromX, moveToX, easeInOut(p));
          cursorY = lerp(moveFromY, moveToY, easeInOut(p));
          if(p >= 1){
            cursorX = moveToX; cursorY = moveToY;
            setPhase('emit', now);
          }
          break;
        }

        case 'emit': {
          emitting = true;
          emitX    = cursorX;
          emitY    = cursorY;
          const rampIn  = Math.min(1, elapsed / RAMP_MS);
          const rampOut = elapsed > EMIT_MS - RAMP_MS
            ? Math.max(0, 1 - (elapsed - (EMIT_MS - RAMP_MS)) / RAMP_MS)
            : 1;
          emitRate = 4 * Math.min(rampIn, rampOut);

          if(elapsed >= EMIT_MS){
            emitting = false; emitRate = 0;
            const next = phaseIdx + 1;
            if(next < pts.length){
              moveFromX = cursorX; moveFromY = cursorY;
              moveToX   = pts[next].x; moveToY = pts[next].y;
              phaseIdx  = next;
              setPhase('move', now);
            } else {
              setPhase('exit', now);
            }
          }
          break;
        }

        case 'exit':
          emitting = false; emitRate = 0;
          if(elapsed > 700) setPhase('fade', now);
          break;

        case 'fade': {
          if(!exitFadeStart) exitFadeStart = now;
          const fp = Math.min(1, (now - exitFadeStart) / 800);
          document.getElementById('intro-overlay').style.opacity = (1 - fp).toFixed(3);
          if(fp > 0.08) document.getElementById('sketch-host').classList.add('visible');
          if(fp >= 1){
            document.getElementById('intro-overlay').style.display = 'none';
            return; // stop
          }
          break;
        }
      }

      // Spawn
      if(emitting){
        const count = Math.ceil(emitRate);
        for(let i = 0; i < count; i++) particles.push(new Particle(emitX, emitY));
      }

      // Update particles
      particles.forEach(p => p.update());
      particles = particles.filter(p => !p.isDead());

      // ── RENDER ─────────────────────────────────────────────────
      ctx.clearRect(0, 0, W, H);

      // Background
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Solid yellow sphere
      ctx.beginPath();
      ctx.arc(CX, CY, SR, 0, Math.PI * 2);
      ctx.fillStyle = YELLOW;
      ctx.fill();

      // Particles (dark trails on yellow)
      particles.forEach(p => p.draw(ctx));

      // Cursor (on top of everything)
      drawCursor(cursorX, cursorY);

      requestAnimationFrame(tick);
    }

    // Init phaseStart on first frame
    requestAnimationFrame(function(now){
      phaseStart = now;
      requestAnimationFrame(tick);
    });

  })();
  </script>
</body>
</html>
