<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fidenza Embed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0e17; }
    canvas { display: block; pointer-events: none; }

    #intro-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0f0e17; pointer-events: none; opacity: 1;
    }
    #intro-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    #sketch-host {
      position: fixed; inset: 0; opacity: 0;
      transition: opacity 1.1s cubic-bezier(0.4,0,0.2,1);
    }
    #sketch-host.visible { opacity: 1; }

    /* ── CONTROLS PANEL ───────────────────────────────────── */
    #ctrl-panel {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 10000;
      width: 260px;
      background: rgba(10,12,18,0.92);
      border: 1px solid rgba(232,254,65,0.25);
      border-radius: 10px;
      padding: 14px 16px 16px;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 11px;
      color: #ccc;
      backdrop-filter: blur(12px);
      pointer-events: auto;
      user-select: none;
    }
    #ctrl-panel h3 {
      color: #e8fe41; font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    #ctrl-panel h3 button {
      font-size: 9px; background: rgba(232,254,65,0.12);
      border: 1px solid rgba(232,254,65,0.3); color: #e8fe41;
      border-radius: 4px; padding: 2px 7px; cursor: pointer;
      font-family: inherit;
    }
    #ctrl-panel h3 button:hover { background: rgba(232,254,65,0.22); }
    .ctrl-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 9px; gap: 8px;
    }
    .ctrl-row label { flex: 0 0 auto; width: 118px; color: #aaa; line-height: 1.3; }
    .ctrl-row input[type=range] {
      flex: 1; height: 3px; accent-color: #e8fe41; cursor: pointer;
    }
    .ctrl-row .val {
      flex: 0 0 36px; text-align: right; color: #e8fe41; font-size: 10px;
    }
    .ctrl-sep { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 10px 0; }
    #export-btn {
      width: 100%; margin-top: 4px; padding: 6px;
      background: rgba(232,254,65,0.1); border: 1px solid rgba(232,254,65,0.35);
      color: #e8fe41; font-family: inherit; font-size: 10px;
      border-radius: 5px; cursor: pointer; letter-spacing: 0.05em;
    }
    #export-btn:hover { background: rgba(232,254,65,0.2); }
    #export-out {
      margin-top: 8px; font-size: 9px; color: #7f8;
      word-break: break-all; white-space: pre-wrap;
      background: rgba(0,0,0,0.4); border-radius: 4px;
      padding: 6px; display: none;
    }
  </style>
</head>
<body>

  <div id="intro-overlay">
    <canvas id="intro-canvas"></canvas>
  </div>

  <div id="sketch-host">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
    <script src="sketch.js"></script>
  </div>

  <!-- Controls panel -->
  <div id="ctrl-panel">
    <h3>Partículas intro <button id="replay-btn">↺ replay</button></h3>

    <div class="ctrl-row">
      <label>quantidade / frame</label>
      <input type="range" id="c-count" min="1" max="20" step="1" value="3">
      <span class="val" id="v-count">3</span>
    </div>
    <div class="ctrl-row">
      <label>velocidade inicial</label>
      <input type="range" id="c-speed" min="0.2" max="5" step="0.1" value="1.2">
      <span class="val" id="v-speed">1.2</span>
    </div>
    <div class="ctrl-row">
      <label>turbulência (noise)</label>
      <input type="range" id="c-turb" min="0" max="1" step="0.01" value="0.32">
      <span class="val" id="v-turb">0.32</span>
    </div>
    <div class="ctrl-row">
      <label>escala noise</label>
      <input type="range" id="c-nscale" min="0.001" max="0.05" step="0.001" value="0.012">
      <span class="val" id="v-nscale">0.012</span>
    </div>
    <div class="ctrl-row">
      <label>tempo noise (z)</label>
      <input type="range" id="c-ntime" min="0" max="0.05" step="0.001" value="0.008">
      <span class="val" id="v-ntime">0.008</span>
    </div>
    <div class="ctrl-row">
      <label>curvatura base</label>
      <input type="range" id="c-curve" min="0" max="0.15" step="0.005" value="0.02">
      <span class="val" id="v-curve">0.020</span>
    </div>

    <hr class="ctrl-sep">

    <div class="ctrl-row">
      <label>vida (frames)</label>
      <input type="range" id="c-life" min="10" max="120" step="1" value="45">
      <span class="val" id="v-life">45</span>
    </div>
    <div class="ctrl-row">
      <label>espessura mín</label>
      <input type="range" id="c-wmin" min="0.3" max="6" step="0.1" value="1.0">
      <span class="val" id="v-wmin">1.0</span>
    </div>
    <div class="ctrl-row">
      <label>espessura máx</label>
      <input type="range" id="c-wmax" min="0.5" max="10" step="0.1" value="2.5">
      <span class="val" id="v-wmax">2.5</span>
    </div>
    <div class="ctrl-row">
      <label>trail length</label>
      <input type="range" id="c-trail" min="2" max="30" step="1" value="10">
      <span class="val" id="v-trail">10</span>
    </div>
    <div class="ctrl-row">
      <label>opacidade</label>
      <input type="range" id="c-alpha" min="0.1" max="1" step="0.01" value="0.75">
      <span class="val" id="v-alpha">0.75</span>
    </div>

    <hr class="ctrl-sep">

    <div class="ctrl-row">
      <label>velocidade cursor</label>
      <input type="range" id="c-cmove" min="200" max="2000" step="50" value="700">
      <span class="val" id="v-cmove">700ms</span>
    </div>
    <div class="ctrl-row">
      <label>tempo emissão</label>
      <input type="range" id="c-emit" min="300" max="3000" step="100" value="1000">
      <span class="val" id="v-emit">1000ms</span>
    </div>
    <div class="ctrl-row">
      <label>dispersão spawn</label>
      <input type="range" id="c-spread" min="0" max="60" step="1" value="8">
      <span class="val" id="v-spread">8</span>
    </div>

    <hr class="ctrl-sep">
    <button id="export-btn">📋 copiar valores hardcode</button>
    <div id="export-out"></div>
  </div>

  <script>
  (function(){
    const YELLOW = '#e8fe41';
    const BG     = '#0f0e17';

    const canvas = document.getElementById('intro-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, CX, CY, SR;

    function resize(){
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      CX = W/2; CY = H/2;
      SR = Math.min(W,H) * 0.38;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── CONTROLS ─────────────────────────────────────────────────
    const C = {
      count:  3,
      speed:  1.2,
      turb:   0.32,
      nscale: 0.012,
      ntime:  0.008,
      curve:  0.02,
      life:   45,
      wmin:   1.0,
      wmax:   2.5,
      trail:  10,
      alpha:  0.75,
      cmove:  700,
      emit:   1000,
      spread: 8,
    };

    function bindSlider(id, key, valId, fmt){
      const inp = document.getElementById(id);
      const val = document.getElementById(valId);
      inp.value = C[key];
      val.textContent = fmt ? fmt(C[key]) : C[key];
      inp.addEventListener('input', ()=>{
        C[key] = parseFloat(inp.value);
        val.textContent = fmt ? fmt(C[key]) : C[key];
      });
    }
    bindSlider('c-count',  'count',  'v-count');
    bindSlider('c-speed',  'speed',  'v-speed');
    bindSlider('c-turb',   'turb',   'v-turb');
    bindSlider('c-nscale', 'nscale', 'v-nscale', v=>v.toFixed(3));
    bindSlider('c-ntime',  'ntime',  'v-ntime',  v=>v.toFixed(3));
    bindSlider('c-curve',  'curve',  'v-curve',  v=>v.toFixed(3));
    bindSlider('c-life',   'life',   'v-life');
    bindSlider('c-wmin',   'wmin',   'v-wmin',   v=>v.toFixed(1));
    bindSlider('c-wmax',   'wmax',   'v-wmax',   v=>v.toFixed(1));
    bindSlider('c-trail',  'trail',  'v-trail');
    bindSlider('c-alpha',  'alpha',  'v-alpha',  v=>v.toFixed(2));
    bindSlider('c-cmove',  'cmove',  'v-cmove',  v=>v+'ms');
    bindSlider('c-emit',   'emit',   'v-emit',   v=>v+'ms');
    bindSlider('c-spread', 'spread', 'v-spread');

    document.getElementById('export-btn').addEventListener('click', ()=>{
      const out = document.getElementById('export-out');
      out.style.display = 'block';
      out.textContent = JSON.stringify(C, null, 2);
    });

    // ── SIMPLEX-LIKE NOISE (smooth hash) ─────────────────────────
    // Lightweight value noise — good enough for Perlin feel
    function fade(t){ return t*t*t*(t*(t*6-15)+10); }
    function mix(a,b,t){ return a*(1-t)+b*t; }
    const PERM = new Uint8Array(512);
    (function(){
      const p=new Uint8Array(256);
      for(let i=0;i<256;i++) p[i]=i;
      for(let i=255;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [p[i],p[j]]=[p[j],p[i]]; }
      for(let i=0;i<512;i++) PERM[i]=p[i&255];
    })();
    function grad(h, x, y){ const u=h<8?x:y, v=h<4?y:h===12||h===14?x:0; return ((h&1)?-u:u)+((h&2)?-v:v); }
    function noise2(x, y){
      const X=Math.floor(x)&255, Y=Math.floor(y)&255;
      x-=Math.floor(x); y-=Math.floor(y);
      const u=fade(x), v=fade(y);
      const a=PERM[X]+Y, b=PERM[X+1]+Y;
      return mix(
        mix(grad(PERM[a]&15,x,y),   grad(PERM[b]&15,x-1,y),   u),
        mix(grad(PERM[a+1]&15,x,y-1),grad(PERM[b+1]&15,x-1,y-1),u),
        v
      );
    }

    let noiseTime = 0;

    // ── PARTICLE ─────────────────────────────────────────────────
    class Particle {
      constructor(ox, oy){
        const sp = C.spread;
        this.x  = ox + (Math.random()-0.5)*sp;
        this.y  = oy + (Math.random()-0.5)*sp;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * C.speed;
        this.vy = Math.sin(angle) * C.speed;
        this.baseCurve = (Math.random()-0.5) * 2 * C.curve;
        this.trail = [{x:this.x, y:this.y}];
        this.life    = 0;
        this.maxLife = Math.round(C.life * (0.7 + Math.random()*0.6));
        this.w       = C.wmin + Math.random()*(C.wmax - C.wmin);
        this.nx = this.x; // noise sample coords
        this.ny = this.y;
        this.nt = noiseTime;
      }

      update(){
        this.life++;
        // Perlin noise steering
        const nx  = this.x * C.nscale;
        const ny  = this.y * C.nscale;
        const nt  = noiseTime;
        const n   = noise2(nx + nt, ny + nt*0.7) * Math.PI * 2;
        // blend noise direction with current velocity
        const turb = C.turb;
        const noiseVx = Math.cos(n);
        const noiseVy = Math.sin(n);
        this.vx = mix(this.vx, noiseVx * C.speed, turb * 0.15);
        this.vy = mix(this.vy, noiseVy * C.speed, turb * 0.15);
        // gentle base curve
        const cos = Math.cos(this.baseCurve), sin = Math.sin(this.baseCurve);
        const nvx = this.vx*cos - this.vy*sin;
        const nvy = this.vx*sin + this.vy*cos;
        this.vx = nvx; this.vy = nvy;

        this.x += this.vx; this.y += this.vy;
        this.trail.push({x:this.x, y:this.y});
        const maxTrail = Math.round(C.trail);
        if(this.trail.length > maxTrail) this.trail.shift();
      }

      draw(ctx){
        if(this.trail.length < 2) return;
        const p = this.life / this.maxLife;
        const alpha = (p < 0.15 ? p/0.15 : p > 0.5 ? 1-(p-0.5)/0.5 : 1) * C.alpha;

        ctx.beginPath();
        ctx.moveTo(this.trail[0].x, this.trail[0].y);
        for(let i=1;i<this.trail.length;i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
        ctx.strokeStyle = `rgba(10,15,20,${alpha.toFixed(3)})`;
        ctx.lineWidth   = this.w;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.stroke();
      }

      isDead(){ return this.life >= this.maxLife; }
    }

    // ── CURSOR (SVG data URI) ─────────────────────────────────────
    // Encoded from the provided SVG, hotspot at tip (approx 5,1)
    const cursorSVG = `<svg width="24" height="24" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.63564 2.28753C5.98325 1.75037 5 2.21445 5 3.05952V17.0583C5 17.9844 6.15025 18.413 6.75622 17.7127L10.2799 13.6402C10.5648 13.3109 10.9788 13.1217 11.4142 13.1217L17.0061 13.1217C17.9444 13.1217 18.3661 11.9461 17.6418 11.3497L6.63564 2.28753Z" fill="${BG}" stroke="${YELLOW}" stroke-width="1.2"/></svg>`;
    const cursorDataURI = 'data:image/svg+xml;base64,' + btoa(cursorSVG);
    const cursorImg = new Image();
    cursorImg.src = cursorDataURI;
    const CURSOR_W = 24, CURSOR_H = 24;

    function drawCursor(x, y){
      if(cursorImg.complete) ctx.drawImage(cursorImg, x, y, CURSOR_W, CURSOR_H);
    }

    function easeInOut(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

    // ── TOUCH POINTS ─────────────────────────────────────────────
    function getTouchPoints(){
      return [
        {x: CX - SR*0.28, y: CY - SR*0.32},
        {x: CX + SR*0.38, y: CY + SR*0.08},
        {x: CX - SR*0.06, y: CY + SR*0.42},
      ];
    }

    // ── STATE ─────────────────────────────────────────────────────
    let phase='init', phaseStart=null, phaseIdx=0;
    let cursorX=0, cursorY=0;
    let moveFromX, moveFromY, moveToX, moveToY;
    let emitting=false, emitX=0, emitY=0;
    let particles=[];
    let exitFadeStart=null;
    let resetFlag=false;

    function setPhase(name, now){ phase=name; phaseStart=now; }

    function resetIntro(now){
      particles=[];
      phase='init'; phaseStart=now; phaseIdx=0;
      emitting=false; exitFadeStart=null;
      document.getElementById('intro-overlay').style.opacity='1';
      document.getElementById('intro-overlay').style.display='';
      document.getElementById('sketch-host').classList.remove('visible');
    }

    document.getElementById('replay-btn').addEventListener('click', ()=>{ resetFlag=true; });

    function tick(now){
      if(resetFlag){ resetFlag=false; resetIntro(now); }

      noiseTime += C.ntime;

      const pts     = getTouchPoints();
      const elapsed = phaseStart!==null ? now-phaseStart : 0;

      switch(phase){
        case 'init':
          cursorX = pts[0].x - SR*0.7;
          cursorY = pts[0].y - SR*0.6;
          if(elapsed > 200){
            moveFromX=cursorX; moveFromY=cursorY;
            moveToX=pts[0].x; moveToY=pts[0].y;
            phaseIdx=0; setPhase('move',now);
          }
          break;

        case 'move': {
          emitting=false;
          const p = Math.min(1, elapsed/C.cmove);
          cursorX = moveFromX + (moveToX-moveFromX)*easeInOut(p);
          cursorY = moveFromY + (moveToY-moveFromY)*easeInOut(p);
          if(p>=1){
            cursorX=moveToX; cursorY=moveToY;
            setPhase('emit',now);
          }
          break;
        }

        case 'emit': {
          emitting=true;
          emitX=cursorX; emitY=cursorY;
          // Cursor leaves early — after 40% of emit time, move to next point
          const leaveAt = C.emit * 0.4;
          if(elapsed >= leaveAt){
            const next = phaseIdx+1;
            if(next < pts.length){
              moveFromX=cursorX; moveFromY=cursorY;
              moveToX=pts[next].x; moveToY=pts[next].y;
              phaseIdx=next; setPhase('move-while-emit',now);
            } else if(elapsed >= C.emit){
              emitting=false; setPhase('exit',now);
            }
          }
          break;
        }

        case 'move-while-emit': {
          // Cursor moves to next point while particles still emit from last spot
          const p = Math.min(1, elapsed/C.cmove);
          cursorX = moveFromX + (moveToX-moveFromX)*easeInOut(p);
          cursorY = moveFromY + (moveToY-moveFromY)*easeInOut(p);
          // Keep emitting from OLD spot for remaining emit time
          // (emitX/emitY don't change — cursor already moved on)
          const emitElapsed = now - (phaseStart - C.emit*0.4); // approx
          if(emitElapsed >= C.emit){
            emitting=false;
          }
          if(p>=1){
            cursorX=moveToX; cursorY=moveToY;
            setPhase('emit',now);
          }
          break;
        }

        case 'exit':
          emitting=false;
          if(elapsed > 500) setPhase('fade',now);
          break;

        case 'fade': {
          if(!exitFadeStart) exitFadeStart=now;
          const fp = Math.min(1,(now-exitFadeStart)/750);
          document.getElementById('intro-overlay').style.opacity=(1-fp).toFixed(3);
          if(fp>0.1) document.getElementById('sketch-host').classList.add('visible');
          if(fp>=1){
            document.getElementById('intro-overlay').style.display='none';
            return;
          }
          break;
        }
      }

      if(emitting){
        const n = Math.round(C.count);
        for(let i=0;i<n;i++) particles.push(new Particle(emitX,emitY));
      }
      particles.forEach(p=>p.update());
      particles = particles.filter(p=>!p.isDead());

      // ── RENDER ───────────────────────────────────────────────
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

      ctx.beginPath();
      ctx.arc(CX,CY,SR,0,Math.PI*2);
      ctx.fillStyle=YELLOW; ctx.fill();

      particles.forEach(p=>p.draw(ctx));
      drawCursor(cursorX, cursorY);

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(function(now){ phaseStart=now; requestAnimationFrame(tick); });

  })();
  </script>

</body>
</html>
