<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fidenza Embed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0e17; }
    canvas { display: block; pointer-events: none; }

    #intro-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0f0e17; pointer-events: none; opacity: 1;
    }
    #intro-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    #sketch-host {
      position: fixed; inset: 0; opacity: 0;
      transition: opacity 1.1s cubic-bezier(0.4,0,0.2,1);
    }
    #sketch-host.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="intro-overlay">
    <canvas id="intro-canvas"></canvas>
  </div>

  <div id="sketch-host">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
    <script src="sketch.js"></script>
  </div>

  <script>
  (function(){
    const YELLOW = '#e8fe41';
    const BG     = '#0f0e17';

    const canvas = document.getElementById('intro-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, CX, CY, SR;

    function resize(){
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      CX = W/2; CY = H/2;
      SR = Math.min(W,H) * 0.38;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── HARDCODED VALUES ─────────────────────────────────────────
    const C = {
      count:  1,
      speed:  0.6,
      turb:   0.37,
      nscale: 0.011,
      ntime:  0.005,
      curve:  0.084,
      life:   94,
      wmin:   1.6,
      wmax:   8.0,
      trail:  4,
      alpha:  1.00,
      spread: 24,
      cmove:  450,
      emit:   1100,
      leave:  0.15,
    };

    // ── PERLIN NOISE ─────────────────────────────────────────────
    function fade(t){ return t*t*t*(t*(t*6-15)+10); }
    function mix(a,b,t){ return a*(1-t)+b*t; }
    const PERM = new Uint8Array(512);
    (function(){
      const p=new Uint8Array(256);
      for(let i=0;i<256;i++) p[i]=i;
      for(let i=255;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=p[i];p[i]=p[j];p[j]=t; }
      for(let i=0;i<512;i++) PERM[i]=p[i&255];
    })();
    function grad(h,x,y){ const u=h<8?x:y,v=h<4?y:h===12||h===14?x:0; return((h&1)?-u:u)+((h&2)?-v:v); }
    function noise2(x,y){
      const X=Math.floor(x)&255, Y=Math.floor(y)&255;
      x-=Math.floor(x); y-=Math.floor(y);
      const u=fade(x), v=fade(y);
      const a=PERM[X]+Y, b=PERM[X+1]+Y;
      return mix(
        mix(grad(PERM[a]&15,x,y),    grad(PERM[b]&15,x-1,y),    u),
        mix(grad(PERM[a+1]&15,x,y-1),grad(PERM[b+1]&15,x-1,y-1),u),
        v
      );
    }
    let noiseTime = 0;

    // ── PARTICLE ─────────────────────────────────────────────────
    class Particle {
      constructor(ox, oy){
        this.x = ox + (Math.random()-0.5)*C.spread;
        this.y = oy + (Math.random()-0.5)*C.spread;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * C.speed;
        this.vy = Math.sin(angle) * C.speed;
        this.baseCurve = (Math.random()-0.5) * 2 * C.curve;
        this.trail = [{x:this.x, y:this.y}];
        this.life    = 0;
        this.maxLife = Math.round(C.life * (0.7 + Math.random()*0.6));
        this.w       = C.wmin + Math.random()*(C.wmax - C.wmin);
      }

      update(){
        this.life++;
        const n = noise2(this.x*C.nscale + noiseTime, this.y*C.nscale + noiseTime*0.7) * Math.PI * 2;
        this.vx = mix(this.vx, Math.cos(n)*C.speed, C.turb*0.15);
        this.vy = mix(this.vy, Math.sin(n)*C.speed, C.turb*0.15);
        const cs=Math.cos(this.baseCurve), sn=Math.sin(this.baseCurve);
        const nvx=this.vx*cs - this.vy*sn;
        const nvy=this.vx*sn + this.vy*cs;
        this.vx=nvx; this.vy=nvy;
        this.x+=this.vx; this.y+=this.vy;
        this.trail.push({x:this.x, y:this.y});
        if(this.trail.length > C.trail) this.trail.shift();
      }

      draw(){
        if(this.trail.length < 2) return;
        const p = this.life / this.maxLife;
        const alpha = (p < 0.15 ? p/0.15 : p > 0.5 ? 1-(p-0.5)/0.5 : 1) * C.alpha;
        ctx.beginPath();
        ctx.moveTo(this.trail[0].x, this.trail[0].y);
        for(let i=1;i<this.trail.length;i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
        ctx.strokeStyle = `rgba(10,15,20,${alpha.toFixed(3)})`;
        ctx.lineWidth   = this.w;
        ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.stroke();
      }

      isDead(){ return this.life >= this.maxLife; }
    }

    // ── CURSOR ───────────────────────────────────────────────────
    const cursorSVG = `<svg width="24" height="24" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.63564 2.28753C5.98325 1.75037 5 2.21445 5 3.05952V17.0583C5 17.9844 6.15025 18.413 6.75622 17.7127L10.2799 13.6402C10.5648 13.3109 10.9788 13.1217 11.4142 13.1217L17.0061 13.1217C17.9444 13.1217 18.3661 11.9461 17.6418 11.3497L6.63564 2.28753Z" fill="${BG}" stroke="${YELLOW}" stroke-width="1.2"/></svg>`;
    const cursorImg = new Image();
    cursorImg.src = 'data:image/svg+xml;base64,' + btoa(cursorSVG);
    function drawCursor(x,y){
      if(cursorImg.complete) ctx.drawImage(cursorImg, x, y, 24, 24);
    }

    function easeInOut(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

    function getTouchPoints(){
      return [
        {x: CX - SR*0.28, y: CY - SR*0.32},
        {x: CX + SR*0.38, y: CY + SR*0.08},
        {x: CX - SR*0.06, y: CY + SR*0.42},
      ];
    }

    // ── STATE MACHINE ─────────────────────────────────────────────
    let phase='init', phaseStart=null, phaseIdx=0;
    let cursorX=0, cursorY=0;
    let mfx,mfy,mtx,mty;
    let emitting=false, emitX=0, emitY=0;
    let particles=[];
    let exitFadeStart=null;
    let emitPhaseStart=null;

    function setPhase(n,now){ phase=n; phaseStart=now; }

    function tick(now){
      noiseTime += C.ntime;
      const pts    = getTouchPoints();
      const elapsed = phaseStart!=null ? now-phaseStart : 0;

      switch(phase){

        case 'init':
          cursorX = pts[0].x - SR*0.7;
          cursorY = pts[0].y - SR*0.6;
          if(elapsed > 180){
            mfx=cursorX; mfy=cursorY; mtx=pts[0].x; mty=pts[0].y;
            phaseIdx=0; setPhase('move',now);
          }
          break;

        case 'move': {
          emitting=false;
          const p=Math.min(1, elapsed/C.cmove);
          cursorX = mfx+(mtx-mfx)*easeInOut(p);
          cursorY = mfy+(mty-mfy)*easeInOut(p);
          if(p>=1){
            cursorX=mtx; cursorY=mty;
            emitPhaseStart=now; setPhase('emit',now);
          }
          break;
        }

        case 'emit': {
          emitting=true; emitX=cursorX; emitY=cursorY;
          const leaveAt = C.emit * C.leave;
          if(elapsed >= leaveAt){
            const next = phaseIdx+1;
            if(next < pts.length){
              mfx=cursorX; mfy=cursorY; mtx=pts[next].x; mty=pts[next].y;
              phaseIdx=next; setPhase('move-emit',now);
            } else if(elapsed >= C.emit){
              emitting=false; setPhase('exit',now);
            }
          }
          break;
        }

        case 'move-emit': {
          const p=Math.min(1, elapsed/C.cmove);
          cursorX = mfx+(mtx-mfx)*easeInOut(p);
          cursorY = mfy+(mty-mfy)*easeInOut(p);
          const totalEmit = now - emitPhaseStart;
          emitting = totalEmit < C.emit;
          if(p>=1){
            cursorX=mtx; cursorY=mty;
            emitPhaseStart=now; setPhase('emit',now);
          }
          break;
        }

        case 'exit':
          emitting=false;
          if(elapsed > Math.max(C.life*1.5, 500)) setPhase('fade',now);
          break;

        case 'fade': {
          if(!exitFadeStart) exitFadeStart=now;
          const fp=Math.min(1,(now-exitFadeStart)/800);
          document.getElementById('intro-overlay').style.opacity=(1-fp).toFixed(3);
          if(fp>0.1) document.getElementById('sketch-host').classList.add('visible');
          if(fp>=1){
            document.getElementById('intro-overlay').style.display='none';
            return;
          }
          break;
        }
      }

      if(emitting){
        for(let i=0;i<C.count;i++) particles.push(new Particle(emitX,emitY));
      }
      particles.forEach(p=>p.update());
      particles=particles.filter(p=>!p.isDead());

      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
      ctx.beginPath();
      ctx.arc(CX,CY,SR,0,Math.PI*2);
      ctx.fillStyle=YELLOW; ctx.fill();
      particles.forEach(p=>p.draw());
      drawCursor(cursorX,cursorY);

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(function(now){ phaseStart=now; requestAnimationFrame(tick); });

  })();
  </script>

</body>
</html>
